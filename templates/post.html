{% extends "base.html" %}

{% block metadata %}
<title>{{ page.title }} | {{ config.title }}</title>
{% endblock metadata %}

{% block content %}
<section class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
  </header>
  <article class="post-content">
    {{ page.content | safe }}
  </article>
</section>
{% endblock content%}
